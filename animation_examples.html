<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejemplos de Animación Zoom-In</title>
<style>
  body {
    background: #050505;
    color: #fff;
    font-family: 'Outfit', system-ui, sans-serif;
    margin: 0;
    padding: 80px 40px;
    display: flex;
    flex-direction: column;
    gap: 120px;
  }
  h1 { text-align: center; margin-bottom: 40px; font-weight: 400; color: #fff; }
  .demo-section { max-width: 1000px; margin: 0 auto; text-align: center; }
  .demo-title { font-size: 24px; color: #c9a96e; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .card {
    background: #1a1c20;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    opacity: 0; /* Hidden initially for animation */
  }

  /* 
   * ANIMATION 1: Subtle Scale Up (Zoom In)
   * A clean, elegant expansion.
   */
  .anim-1 .card {
    transform: scale(0.85);
    transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .anim-1.in .card {
    opacity: 1;
    transform: scale(1);
  }

  /* 
   * ANIMATION 2: Zoom In + Slide Up
   * Adds a vertical motion to the scale.
   */
  .anim-2 .card {
    transform: scale(0.9) translateY(40px);
    transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .anim-2.in .card {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* 
   * ANIMATION 3: Dramatic 3D Zoom In
   * Starts very small with slight rotation to feel cinematic.
   */
  .anim-3 { perspective: 1000px; }
  .anim-3 .card {
    transform: translateZ(-100px) scale(0.7) rotateX(10deg);
    transition: opacity 1s ease-out, transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .anim-3.in .card {
    opacity: 1;
    transform: translateZ(0) scale(1) rotateX(0);
  }

  /* Staggering delays for the grid items */
  .card:nth-child(1) { transition-delay: 0.1s; }
  .card:nth-child(2) { transition-delay: 0.3s; }
  .card:nth-child(3) { transition-delay: 0.5s; }

</style>
</head>
<body>

  <h1>Ejemplos de Zoom-In al hacer Scroll</h1>

  <div class="demo-section anim-1 reveal-target">
    <div class="demo-title">Opción 1: Zoom In Sutil</div>
    <div class="grid">
      <div class="card">Item 1</div>
      <div class="card">Item 2</div>
      <div class="card">Item 3</div>
    </div>
  </div>

  <div class="demo-section anim-2 reveal-target">
    <div class="demo-title">Opción 2: Zoom In + Deslizamiento (Arriba)</div>
    <div class="grid">
      <div class="card">Item 1</div>
      <div class="card">Item 2</div>
      <div class="card">Item 3</div>
    </div>
  </div>

  <div class="demo-section anim-3 reveal-target">
    <div class="demo-title">Opción 3: Zoom In 3D Cinemático</div>
    <div class="grid">
      <div class="card">Item 1</div>
      <div class="card">Item 2</div>
      <div class="card">Item 3</div>
    </div>
  </div>

  <script>
    // Intersection Observer to trigger animations when scrolling into view
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in');
          // Optional: Unobserve after animating once
          // observer.unobserve(entry.target);
        } else {
          // Remove class to replay animation when scrolling back up (for demo purposes)
          entry.target.classList.remove('in');
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.reveal-target').forEach(el => observer.observe(el));
  </script>
</body>
</html>
